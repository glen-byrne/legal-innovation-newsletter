name: Generate newsletter

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date (YYYY-MM-DD). Leave blank for current Europe/Dublin date."
        required: false
        type: string
      maximum_final_stories:
        description: "Maximum final stories"
        required: false
        default: "12"
        type: string
      maximum_review_stories:
        description: "Maximum review shortlist stories"
        required: false
        default: "30"
        type: string
      maximum_candidates:
        description: "Maximum candidate articles collected from RSS/source pages before filtering"
        required: false
        default: "80"
        type: string
      candidate_file:
        description: "Optional path to Codex candidate JSON file. If blank, issues/YYYY-MM-DD/candidates.json is auto-used when present."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL_HIGH_QUALITY: ${{ vars.OPENAI_MODEL_HIGH_QUALITY || secrets.OPENAI_MODEL_HIGH_QUALITY }}
      OPENAI_MODEL_FAST: ${{ vars.OPENAI_MODEL_FAST || secrets.OPENAI_MODEL_FAST }}
      ENABLE_OPENAI_WEB_SEARCH: ${{ vars.ENABLE_OPENAI_WEB_SEARCH || 'false' }}
      MAX_FINAL_STORIES: ${{ inputs.maximum_final_stories }}
      MAX_REVIEW_STORIES: ${{ inputs.maximum_review_stories }}
      MAX_CANDIDATES: ${{ inputs.maximum_candidates }}
      REQUIRE_HUMAN_REVIEW: "true"
      DRY_RUN_NO_AI: "false"
      NEWSLETTER_NAME: "The Irish Legal Innovator"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve issue date
        id: issue_date
        shell: bash
        run: |
          issue_date="${{ inputs.run_date }}"
          if [ -z "$issue_date" ]; then
            issue_date="$(TZ=Europe/Dublin date +%F)"
          fi
          echo "value=$issue_date" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Generate issue files
        shell: bash
        run: |
          args=(generate --no-pr --pr-body-output .newsletter_pr_body.md --max-candidates "${{ inputs.maximum_candidates }}" --max-review-stories "${{ inputs.maximum_review_stories }}" --max-final-stories "${{ inputs.maximum_final_stories }}")
          if [ -n "${{ inputs.run_date }}" ]; then
            args+=(--run-date "${{ inputs.run_date }}")
          fi
          candidate_file="${{ inputs.candidate_file }}"
          if [ -z "$candidate_file" ] && [ -f "issues/${{ steps.issue_date.outputs.value }}/candidates.json" ]; then
            candidate_file="issues/${{ steps.issue_date.outputs.value }}/candidates.json"
          fi
          if [ -n "$candidate_file" ]; then
            args+=(--candidate-file "$candidate_file")
          fi
          python -m legal_innovator.main "${args[@]}"

      - name: Commit regenerated files to existing issue branch
        if: ${{ github.ref_name == format('newsletter/{0}', steps.issue_date.outputs.value) }}
        shell: bash
        run: |
          branch="newsletter/${{ steps.issue_date.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "issues/${{ steps.issue_date.outputs.value }}" data/seen_urls.json data/seen_story_clusters.json
          if git diff --cached --quiet; then
            echo "No regenerated files changed."
          else
            git commit -m "Refresh draft issue: The Irish Legal Innovator - ${{ steps.issue_date.outputs.value }}"
            git push origin "HEAD:$branch"
          fi

      - name: Update existing pull request body
        if: ${{ github.ref_name == format('newsletter/{0}', steps.issue_date.outputs.value) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          branch="newsletter/${{ steps.issue_date.outputs.value }}"
          title="Draft issue: The Irish Legal Innovator - ${{ steps.issue_date.outputs.value }}"
          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" --title "$title" --body-file .newsletter_pr_body.md
          else
            echo "No existing pull request found for $branch; generated files were committed only."
          fi

      - name: Create pull request
        if: ${{ github.ref_name != format('newsletter/{0}', steps.issue_date.outputs.value) }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Draft issue: The Irish Legal Innovator - ${{ steps.issue_date.outputs.value }}"
          branch: "newsletter/${{ steps.issue_date.outputs.value }}"
          title: "Draft issue: The Irish Legal Innovator - ${{ steps.issue_date.outputs.value }}"
          body-path: .newsletter_pr_body.md
          add-paths: |
            issues/${{ steps.issue_date.outputs.value }}
            data/seen_urls.json
            data/seen_story_clusters.json
