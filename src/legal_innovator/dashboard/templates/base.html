<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Legal Innovation Newsletter{% endblock %}</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: rgba(255, 255, 255, 0.9);
        --panel-solid: #ffffff;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: rgba(0, 0, 0, 0.10);
        --line-strong: rgba(0, 0, 0, 0.16);
        --accent: #0071e3;
        --accent-strong: #005bb5;
        --success: #0a7f42;
        --danger: #b42318;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
        letter-spacing: 0;
      }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .brand-title {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.2;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 28px auto 64px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 26px;
      }

      .page-title {
        color: var(--text);
        font-size: 34px;
        line-height: 1.12;
        margin: 0 0 8px;
        font-weight: 760;
        letter-spacing: -0.02em;
      }

      .muted { color: var(--muted); }

      .message, .error {
        border-radius: 14px;
        padding: 12px 14px;
        margin: 0 0 18px;
        border: 1px solid transparent;
      }

      .message { background: #eef8f1; color: var(--success); border-color: #c9ecd4; }
      .error { background: #fff1f0; color: var(--danger); border-color: #ffd0cb; }

      .button {
        appearance: none;
        border: 2px solid var(--text);
        background: #ffffff;
        color: var(--text);
        border-radius: 999px;
        padding: 12px 22px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        line-height: 1.2;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        box-shadow: none;
      }

      .button:hover {
        background: #f5f5f7;
        border-color: var(--text);
        text-decoration: none;
        transform: translateY(-1px);
      }

      .button.secondary,
      .button.ghost {
        background: #ffffff;
        color: var(--text);
        border-color: var(--text);
        box-shadow: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }

      .section-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin: 18px 0 0;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel-solid);
        padding: 18px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.04);
      }

      .story-card {
        display: grid;
        grid-template-columns: 30px 1fr;
        gap: 14px;
        position: relative;
        padding-bottom: 54px;
      }

      .story-card + .story-card { margin-top: 12px; }

      .story-card.is-dragging {
        opacity: 0.55;
        cursor: grabbing;
      }

      .story-card.is-drag-active {
        border-color: rgba(0, 113, 227, 0.38);
        box-shadow: 0 10px 32px rgba(0, 113, 227, 0.10);
      }

      .story-card-content {
        min-width: 0;
      }

      .story-drag-handle {
        position: absolute;
        right: 14px;
        bottom: 14px;
        width: 32px;
        height: 32px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #f5f5f7;
        cursor: grab;
        display: grid;
        grid-template-columns: repeat(2, 4px);
        grid-auto-rows: 4px;
        justify-content: center;
        align-content: center;
        gap: 4px;
      }

      .story-drag-handle:hover,
      .story-drag-handle:focus {
        background: #eaf3ff;
        border-color: rgba(0, 113, 227, 0.38);
        outline: none;
      }

      .story-drag-handle:active {
        cursor: grabbing;
      }

      .story-drag-handle span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #6e6e73;
      }

      .story-title {
        margin: 0;
        color: var(--text);
        font-size: 19px;
        line-height: 1.3;
        font-weight: 720;
        letter-spacing: -0.01em;
      }

      .meta {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .region-tags {
        margin: 9px 0 0;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .region-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(0, 113, 227, 0.22);
        color: #034f91;
        background: #eef6ff;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
      }

      .region-tag-remove {
        appearance: none;
        border: 0;
        background: rgba(0, 113, 227, 0.10);
        color: #034f91;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        padding: 0;
        font-size: 12px;
        line-height: 16px;
        font-weight: 800;
        cursor: pointer;
      }

      .region-tag-remove:hover,
      .region-tag-remove:focus {
        background: rgba(0, 113, 227, 0.20);
        outline: none;
      }

      .region-add-wrap {
        position: relative;
        display: inline-flex;
      }

      .region-add-button {
        appearance: none;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #f5f5f7;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        line-height: 1.2;
        font-weight: 700;
        cursor: pointer;
      }

      .region-add-button:hover,
      .region-add-button:focus {
        background: #eeeeef;
        color: var(--text);
        outline: none;
      }

      .region-add-menu {
        position: absolute;
        left: 0;
        top: calc(100% + 6px);
        z-index: 30;
        width: 180px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
      }

      .region-option {
        appearance: none;
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        border-radius: 9px;
        padding: 8px 9px;
        font-size: 13px;
        cursor: pointer;
      }

      .region-option:hover,
      .region-option:focus {
        background: #f5f5f7;
        outline: none;
      }

      .note {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.55;
      }

      .sources {
        margin: 10px 0 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-block;
        border: 1px solid var(--line);
        color: var(--text);
        background: #f5f5f7;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 12px;
      }

      .source-url-editor {
        margin-top: 12px;
        display: grid;
        gap: 6px;
      }

      .source-url-editor label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .source-url-input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fbfbfd;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      .source-url-input:focus {
        border-color: var(--accent);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
      }

      .toolbar {
        position: sticky;
        bottom: 0;
        background: rgba(245, 245, 247, 0.9);
        backdrop-filter: blur(16px);
        border-top: 1px solid var(--line);
        padding: 18px 0 calc(28px + env(safe-area-inset-bottom));
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      input[type="checkbox"] {
        width: 22px;
        height: 22px;
        accent-color: var(--accent);
      }

      code {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 7px;
        padding: 2px 5px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 720px) {
        .topbar { align-items: flex-start; flex-direction: column; }
        .page-title { font-size: 28px; }
        .toolbar { align-items: stretch; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="brand-title">Legal Innovation Newsletter</div>
        <div class="brand-subtitle">Editorial dashboard</div>
      </div>
      {% if request.url.path != "/login" %}
      <a class="button ghost" href="/">Home</a>
      {% endif %}
    </header>
    <main class="shell">
      {% if message %}<p class="message">{{ message }}</p>{% endif %}
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
