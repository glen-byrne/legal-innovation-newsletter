<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Legal Innovation Newsletter{% endblock %}</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: rgba(255, 255, 255, 0.9);
        --panel-solid: #ffffff;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: rgba(0, 0, 0, 0.10);
        --line-strong: rgba(0, 0, 0, 0.16);
        --accent: #0071e3;
        --accent-strong: #005bb5;
        --success: #0a7f42;
        --danger: #b42318;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% -10%, rgba(0, 113, 227, 0.10), transparent 34rem),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 42%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
        letter-spacing: 0;
      }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .brand-title {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.2;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .topbar form { margin: 0; }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 28px auto 64px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 26px;
      }

      .page-title {
        color: var(--text);
        font-size: 34px;
        line-height: 1.12;
        margin: 0 0 8px;
        font-weight: 760;
        letter-spacing: -0.02em;
      }

      .muted { color: var(--muted); }

      .message, .error {
        border-radius: 14px;
        padding: 12px 14px;
        margin: 0 0 18px;
        border: 1px solid transparent;
      }

      .message { background: #eef8f1; color: var(--success); border-color: #c9ecd4; }
      .error { background: #fff1f0; color: var(--danger); border-color: #ffd0cb; }

      .button {
        appearance: none;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        line-height: 1.2;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        box-shadow: 0 6px 16px rgba(0, 113, 227, 0.18);
      }

      .button:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        text-decoration: none;
        transform: translateY(-1px);
      }

      .button.secondary {
        background: white;
        color: var(--accent);
        border-color: var(--line-strong);
        box-shadow: none;
      }

      .button.ghost {
        background: white;
        color: var(--text);
        border-color: var(--line-strong);
        box-shadow: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel-solid);
        padding: 18px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.04);
      }

      .story-card {
        display: grid;
        grid-template-columns: 30px 1fr;
        gap: 14px;
      }

      .story-card + .story-card { margin-top: 12px; }

      .story-title {
        margin: 0;
        color: var(--text);
        font-size: 19px;
        line-height: 1.3;
        font-weight: 720;
        letter-spacing: -0.01em;
      }

      .meta {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .note {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.55;
      }

      .sources {
        margin: 10px 0 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-block;
        border: 1px solid var(--line);
        color: var(--text);
        background: #f5f5f7;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 12px;
      }

      .toolbar {
        position: sticky;
        bottom: 0;
        background: rgba(245, 245, 247, 0.9);
        backdrop-filter: blur(16px);
        border-top: 1px solid var(--line);
        padding: 14px 0 0;
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      input[type="checkbox"] {
        width: 22px;
        height: 22px;
        accent-color: var(--accent);
      }

      code {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 7px;
        padding: 2px 5px;
      }

      @media (max-width: 720px) {
        .topbar { align-items: flex-start; flex-direction: column; }
        .page-title { font-size: 28px; }
        .toolbar { align-items: stretch; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="brand-title">Legal Innovation Newsletter</div>
        <div class="brand-subtitle">Editorial dashboard</div>
      </div>
      {% if request.url.path != "/login" %}
      <form method="post" action="/logout">
        <button class="button ghost" type="submit">Sign out</button>
      </form>
      {% endif %}
    </header>
    <main class="shell">
      {% if message %}<p class="message">{{ message }}</p>{% endif %}
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
