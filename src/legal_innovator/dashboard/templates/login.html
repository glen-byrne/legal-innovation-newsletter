{% extends "base.html" %}

{% block title %}Sign in - The Irish Legal Innovator{% endblock %}

{% block content %}
<section class="panel" style="max-width: 520px; margin: 0 auto;">
  <h1 class="page-title">Sign in</h1>
  <p class="muted">Use the dashboard password configured in the hosting environment.</p>
  {% if setup_error %}
    <p class="error">{{ setup_error }}</p>
  {% endif %}
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login">
    <label for="password" style="display:block; font-weight:700; margin: 18px 0 8px;">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      autocomplete="current-password"
      style="width:100%; padding:12px; border:1px solid var(--line); border-radius:6px; font-size:16px;"
    >
    <button class="button" type="submit" style="margin-top:16px;">Sign in</button>
  </form>
</section>
{% endblock %}
